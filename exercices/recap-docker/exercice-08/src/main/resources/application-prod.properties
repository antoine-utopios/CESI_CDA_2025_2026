# Database connection
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:mysql-kennel}:${DATABASE_PORT:3306}/${DATABASE_NAME:kennelDB}
spring.datasource.username=${DATABASE_USER:admin}
spring.datasource.password=${DATABASE_PASSWORD:password}

# Logs API
logs.api.endpoint=http://logs-api:8090/api/v1/logs

# JPA settings
spring.jpa.show-sql=false